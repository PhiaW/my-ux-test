<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任性選擇器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { font-family: inherit; border: none; cursor: pointer; background: none; }

    :root {
      /* Light Mode — 暖色晨曦 */
      --bg:         #FFFBF2;
      --surface:    #FFFFFF;
      --primary:    #FFB380;
      --primary-hv: #F09060;
      --primary-lt: #FFD9B3;
      --text:       #4A443F;
      --muted:      #7A6E68;
      --border:     #EAE0D8;
      --on-primary: #3D2418;   /* text on primary-bg, 9.4:1 contrast */
      --sh:         0 2px 16px rgba(74,68,63,.07);
      --sh-lg:      0 8px 32px rgba(74,68,63,.12);
      --r:          20px;
      --rs:         14px;
      --fs-display: 32px;
      --fs-title:   28px;
      --fs-body:    18px;
      --fs-label:   16px;
      --fs-caption: 14px;
    }

    [data-theme="dark"] {
      /* Dark Mode — 微醺餘暉 */
      --bg:         #2B2621;
      --surface:    #3D352F;
      --primary:    #D4966A;
      --primary-hv: #BA7A52;
      --primary-lt: #5C4B3D;
      --text:       #F2E9E1;
      --muted:      #BDA090;
      --border:     #4A4036;
      --on-primary: #2B2621;   /* text on primary-bg, 6:1 contrast */
      --sh:         0 2px 16px rgba(0,0,0,.35);
      --sh-lg:      0 8px 32px rgba(0,0,0,.55);
    }

    [data-theme="dark"] .final-card {
      box-shadow: 0 8px 36px rgba(212,150,106,.3);
    }

    [data-theme="dark"] .wheel-ptr {
      filter: drop-shadow(0 2px 6px rgba(212,150,106,.6));
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
    }

    /* ── App shell ─────────────────────────────── */
    .app {
      width: 100%;
      max-width: 420px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 0 20px 60px;
    }

    /* ── Header ────────────────────────────────── */
    .app-header {
      padding: 44px 0 18px;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: space-between;
    }

    .header-main {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .app-title {
      font-family: 'Playfair Display', serif;
      font-size: var(--fs-display);
      font-weight: 700;
      letter-spacing: -.5px;
      line-height: 1.15;
    }

    .app-sub {
      font-size: var(--fs-label);
      font-weight: 300;
      color: var(--muted);
      letter-spacing: .3px;
    }

    .theme-toggle {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: var(--sh);
      transition: all .2s ease;
    }

    .theme-toggle:hover {
      border-color: var(--primary);
      background: var(--primary-lt);
    }

    /* ── Progress bar ──────────────────────────── */
    .progress {
      display: flex;
      flex-direction: row;
      gap: 5px;
      padding: 6px 0 28px;
    }

    .bar {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      transition: background .35s ease;
    }

    .bar.done   { background: var(--primary-lt); }
    .bar.active { background: var(--primary); }

    /* ── Stage ─────────────────────────────────── */
    #stage { flex: 1; display: flex; flex-direction: column; }

    .scene {
      display: flex;
      flex-direction: column;
      gap: 14px;
      animation: slideUp .35s ease forwards;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Shared label ──────────────────────────── */
    .eyebrow {
      font-size: var(--fs-body);
      font-weight: 500;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Category buttons ──────────────────────── */
    .cat-btn {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: 20px 22px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--sh);
      text-align: left;
      transition: all .2s ease;
    }

    .cat-btn:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: var(--sh-lg);
    }

    .cat-btn:active { transform: translateY(0); }

    .cat-name {
      display: block;
      font-size: var(--fs-title);
      font-weight: 700;
      color: var(--text);
    }

    .cat-hint {
      display: block;
      font-size: var(--fs-caption);
      font-weight: 300;
      color: var(--muted);
      margin-top: 3px;
    }

    .cat-arr { font-size: var(--fs-body); color: var(--muted); opacity: .45; }

    /* ── Wheel ─────────────────────────────────── */
    .wheel-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .wheel-subtitle {
      font-size: var(--fs-label);
      color: var(--muted);
      font-weight: 400;
      text-align: center;
    }

    .wheel-frame {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wheel-ptr {
      position: absolute;
      top: -13px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 9px solid transparent;
      border-right: 9px solid transparent;
      border-top: 18px solid var(--primary);
      filter: drop-shadow(0 2px 6px rgba(255,179,128,.7));
      z-index: 2;
    }

    #wheel {
      display: block;
      border-radius: 50%;
      box-shadow: 0 6px 28px rgba(28,15,10,.15);
    }

    .spin-status {
      font-size: var(--fs-label);
      color: var(--muted);
      font-weight: 300;
      text-align: center;
      animation: blink 1.3s ease infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: .25; }
    }

    /* ── Result card ───────────────────────────── */
    .result-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      box-shadow: var(--sh-lg);
      animation: popIn .45s cubic-bezier(.34,1.56,.64,1) forwards;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    .result-emoji { font-size: 44px; }
    .result-name  { font-size: var(--fs-display); font-weight: 700; margin-top: 4px; }
    .result-hint  {
      font-size: var(--fs-caption); color: var(--muted);
      font-weight: 300; font-style: italic;
    }

    /* ── Action buttons ────────────────────────── */
    .action-stack { display: flex; flex-direction: column; gap: 10px; }

    .btn-main {
      padding: 16px;
      background: var(--primary);
      border-radius: var(--rs);
      font-size: var(--fs-body);
      font-weight: 500;
      color: var(--on-primary);
      transition: background .2s ease;
      text-align: center;
    }

    .btn-main:hover { background: var(--primary-hv); }

    .btn-ghost {
      padding: 16px;
      color: var(--muted);
      border: 1.5px solid var(--border);
      border-radius: var(--rs);
      font-size: var(--fs-label);
      font-weight: 400;
      transition: all .2s ease;
      text-align: center;
    }

    .btn-ghost:hover { color: var(--primary); border-color: var(--primary); }

    /* ── Direction chooser ─────────────────────── */
    .dir-q {
      font-size: var(--fs-body);
      font-weight: 500;
      line-height: 1.55;
      color: var(--text);
    }

    .dir-list { display: flex; flex-direction: column; gap: 10px; }

    .dir-btn {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      text-align: left;
      box-shadow: var(--sh);
      transition: all .2s ease;
    }

    .dir-btn:hover {
      border-color: var(--primary);
      background: var(--primary-lt);
      transform: translateX(4px);
    }

    .dir-icon { font-size: 28px; flex-shrink: 0; }

    .dir-text { display: flex; flex-direction: column; gap: 2px; }

    .dir-name { font-size: var(--fs-body); font-weight: 500; }
    .dir-desc { font-size: var(--fs-caption); font-weight: 300; color: var(--muted); }

    /* ── Final result ──────────────────────────── */
    .final-card {
      background: var(--primary);
      border-radius: var(--r);
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 36px rgba(255,179,128,.4);
      animation: popIn .5s cubic-bezier(.34,1.56,.64,1) forwards;
    }

    .final-eyebrow {
      font-size: var(--fs-caption);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--on-primary);
      opacity: .7;
    }

    .final-emoji { font-size: 54px; }

    .final-name {
      font-size: var(--fs-display);
      font-weight: 700;
      color: var(--on-primary);
      text-align: center;
    }

    .final-context {
      font-size: var(--fs-label);
      color: var(--on-primary);
      font-weight: 300;
      opacity: .75;
    }

    .btn-restart {
      margin-top: 10px;
      padding: 12px 30px;
      background: rgba(255,255,255,.18);
      color: var(--on-primary);
      border: 1.5px solid rgba(255,255,255,.35);
      border-radius: 100px;
      font-size: var(--fs-label);
      font-weight: 400;
      transition: all .2s ease;
    }

    .btn-restart:hover { background: rgba(255,255,255,.28); }

    /* ── Back link ─────────────────────────────── */
    .back-link {
      font-size: var(--fs-label);
      color: var(--muted);
      cursor: pointer;
      width: fit-content;
      transition: color .2s;
    }

    .back-link:hover { color: var(--primary); }

    /* ── Can't find button ─────────────────────── */
    .btn-cantfind {
      padding: 14px 16px;
      color: var(--muted);
      font-size: var(--fs-label);
      font-weight: 400;
      border: 1.5px dashed var(--border);
      border-radius: var(--rs);
      transition: all .2s ease;
      text-align: center;
    }

    .btn-cantfind:hover {
      border-color: var(--primary);
      color: var(--primary);
      border-style: solid;
    }

    /* ── Can't find card ───────────────────────── */
    .cantfind-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 32px 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      box-shadow: var(--sh-lg);
      text-align: center;
      animation: popIn .4s cubic-bezier(.34,1.56,.64,1) forwards;
    }

    .cantfind-emoji { font-size: 44px; }

    .cantfind-title {
      font-size: var(--fs-title);
      font-weight: 700;
      color: var(--text);
      margin-top: 4px;
    }

    .cantfind-msg {
      font-size: var(--fs-label);
      font-weight: 300;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── Exhausted screen ──────────────────────── */
    .exhausted-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 44px 24px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      box-shadow: var(--sh-lg);
      animation: popIn .45s cubic-bezier(.34,1.56,.64,1) forwards;
      text-align: center;
    }

    .exhausted-emoji { font-size: 52px; }

    .exhausted-title {
      font-size: var(--fs-title);
      font-weight: 700;
      color: var(--text);
    }

    .exhausted-msg {
      font-size: var(--fs-body);
      font-weight: 300;
      color: var(--muted);
      line-height: 1.7;
    }

    .btn-calm {
      margin-top: 8px;
      padding: 14px 32px;
      background: var(--bg);
      color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 100px;
      font-size: var(--fs-label);
      font-weight: 500;
      transition: all .2s ease;
    }

    .btn-calm:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* ── Find nearby button (inside final-card) ── */
    .btn-find-nearby {
      width: 100%;
      margin-top: 14px;
      padding: 13px 20px;
      background: rgba(255,255,255,.22);
      color: var(--on-primary);
      border: 1.5px solid rgba(255,255,255,.45);
      border-radius: var(--rs);
      font-size: var(--fs-label);
      font-weight: 500;
      transition: background .2s ease;
    }

    .btn-find-nearby:hover { background: rgba(255,255,255,.32); }

    /* ── Finding (loading) ─────────────────────── */
    .finding-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 48px 0;
    }

    .finding-spinner {
      width: 44px;
      height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .finding-text {
      font-size: var(--fs-body);
      font-weight: 300;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    /* ── Nearby reminder banner ───────────────── */
    .nearby-reminder {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--primary-lt);
      border-radius: var(--rs);
      border-left: 3px solid var(--primary);
    }

    .nearby-reminder-label {
      font-size: var(--fs-caption);
      font-weight: 400;
      color: var(--muted);
      flex-shrink: 0;
    }

    .nearby-reminder-food {
      font-size: var(--fs-body);
      font-weight: 700;
      color: var(--primary);
    }

    /* ── Google Maps search card ───────────────── */
    .maps-search-card {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 20px 20px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--sh-lg);
      text-decoration: none;
      color: var(--text);
      transition: all .2s ease;
    }

    .maps-search-card:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 10px 36px rgba(28,15,10,.14);
    }

    .maps-search-left {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 14px;
    }

    .maps-search-icon { font-size: 32px; }

    .maps-search-text {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .maps-search-title {
      font-size: var(--fs-body);
      font-weight: 600;
      color: var(--text);
    }

    .maps-search-sub {
      font-size: var(--fs-caption);
      font-weight: 300;
      color: var(--muted);
    }

    .maps-search-arrow {
      font-size: var(--fs-body);
      color: var(--muted);
      flex-shrink: 0;
    }

    /* ── Util: stack ───────────────────────────── */
    .stack { display: flex; flex-direction: column; gap: 12px; }

    /* ── Persona selection ─────────────────────── */
    .persona-list { display: flex; flex-direction: column; gap: 14px; }

    .persona-btn {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 18px;
      padding: 24px 20px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--sh);
      text-align: left;
      transition: all .25s ease;
    }

    .persona-btn:hover {
      border-color: var(--primary);
      transform: translateY(-3px);
      box-shadow: var(--sh-lg);
    }

    .persona-btn:active { transform: translateY(0); }

    .persona-icon {
      font-size: 32px;
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--primary-lt);
      border-radius: 16px;
      flex-shrink: 0;
    }

    .persona-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .persona-name {
      font-size: var(--fs-body);
      font-weight: 700;
      color: var(--text);
    }

    .persona-desc {
      font-size: var(--fs-caption);
      color: var(--muted);
      font-weight: 300;
    }

    .persona-tags {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .persona-tag {
      font-size: 12px;
      font-weight: 500;
      color: var(--primary);
      background: var(--primary-lt);
      padding: 2px 10px;
      border-radius: 100px;
    }

    /* ── Persona indicator bar (INITIAL screen) ── */
    .persona-indicator {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--primary-lt);
      border-radius: var(--rs);
      margin-bottom: 4px;
    }

    .persona-indicator-icon { font-size: 16px; }

    .persona-indicator-text {
      font-size: var(--fs-caption);
      font-weight: 600;
      color: var(--on-primary);
    }

    .switch-persona {
      font-size: var(--fs-caption);
      color: var(--muted);
      cursor: pointer;
      margin-left: auto;
      transition: color .2s;
    }

    .switch-persona:hover { color: var(--text); }
  </style>
</head>
<body>
<div class="app">
  <header class="app-header">
    <div class="header-main">
      <h1 class="app-title">任性選擇器</h1>
      <p class="app-sub">肚子餓了，讓命運幫你決定</p>
    </div>
    <button class="theme-toggle" id="theme-toggle" aria-label="切換深色模式">🌙</button>
  </header>

  <div class="progress" id="progress">
    <div class="bar active" id="bar-0"></div>
    <div class="bar" id="bar-1"></div>
    <div class="bar" id="bar-2"></div>
    <div class="bar" id="bar-3"></div>
  </div>

  <main id="stage"></main>
</div>

<script>

// ══════════════════════════════════════════════════
//  WHEEL ENGINE
// ══════════════════════════════════════════════════
const WHEEL_COLORS_LIGHT = [
  '#FFE8D0','#FFF3E0','#FFD9B3','#FFECD8',
  '#FFE0C8','#FFF0D8','#FFD5A8','#FFEACC',
];

const WHEEL_COLORS_DARK = [
  '#3D2E24','#4A3828','#2E2420','#3A2C22',
  '#4A3424','#302824','#3A3020','#2C2420',
];

let wheelRot = 0;
let wheelRaf = null;
let afterDraw = null;

function drawWheel(canvas, items, rot) {
  const ctx    = canvas.getContext('2d');
  const W      = canvas.width, H = canvas.height;
  const cx     = W / 2, cy = H / 2;
  const R      = cx - 4;
  const N      = items.length;
  const seg    = (Math.PI * 2) / N;
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const colors = isDark ? WHEEL_COLORS_DARK : WHEEL_COLORS_LIGHT;

  ctx.clearRect(0, 0, W, H);

  items.forEach((item, i) => {
    const a0 = -Math.PI / 2 + i * seg + rot;
    const a1 = a0 + seg;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, a0, a1);
    ctx.closePath();
    ctx.fillStyle = colors[i % colors.length];
    ctx.fill();

    ctx.strokeStyle = isDark ? 'rgba(255,255,255,.12)' : 'rgba(255,255,255,.85)';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(a0 + seg / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = isDark ? '#EDE8E0' : '#2C1810';
    const fs = Math.max(12, Math.min(14, R * 0.115));
    ctx.font = `${fs}px 'Noto Sans TC', sans-serif`;
    ctx.fillText(item.name, R - 10, fs / 3);
    ctx.restore();
  });

  // Center hub
  ctx.beginPath();
  ctx.arc(cx, cy, 18, 0, Math.PI * 2);
  ctx.fillStyle = isDark ? '#1C2420' : '#FFFFFF';
  ctx.fill();
  ctx.strokeStyle = isDark ? 'rgba(255,255,255,.1)' : 'rgba(28,15,10,.08)';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function spinWheel(canvas, items, onDone) {
  if (wheelRaf) { cancelAnimationFrame(wheelRaf); wheelRaf = null; }

  const N      = items.length;
  const segRad = (Math.PI * 2) / N;
  const target = Math.floor(Math.random() * N);

  // Compute forward delta to land segment `target` at pointer
  const curMod = ((wheelRot % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  const tgtMod = ((-(target + 0.5) * segRad) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
  let delta    = tgtMod - curMod;
  if (delta < 0) delta += Math.PI * 2;

  const extra      = (5 + Math.floor(Math.random() * 4)) * Math.PI * 2;
  const totalDelta = extra + delta;
  const startRot   = wheelRot;
  const endRot     = wheelRot + totalDelta;
  const dur        = 3600 + Math.random() * 900;
  const t0         = performance.now();

  let stopRequested = false;

  // Snap to nearest segment then call onDone
  function snapToNearest() {
    canvas.style.cursor = '';
    const TWO_PI     = Math.PI * 2;
    const nearestIdx = Math.floor((((-wheelRot) % TWO_PI) + TWO_PI) % TWO_PI / segRad) % N;
    const targetBase = -(nearestIdx + 0.5) * segRad;
    let snapDelta    = ((targetBase - wheelRot) % TWO_PI + TWO_PI) % TWO_PI;
    if (snapDelta > Math.PI) snapDelta -= TWO_PI; // take shorter path

    const snapStart = wheelRot;
    const snapDur   = 450;
    const snapT0    = performance.now();

    function snapTick(t) {
      const sp = Math.min((t - snapT0) / snapDur, 1);
      const se = 1 - Math.pow(1 - sp, 3); // ease-out cubic
      wheelRot = snapStart + snapDelta * se;
      drawWheel(canvas, items, wheelRot);
      if (sp < 1) {
        wheelRaf = requestAnimationFrame(snapTick);
      } else {
        wheelRot = snapStart + snapDelta;
        onDone(nearestIdx);
      }
    }
    wheelRaf = requestAnimationFrame(snapTick);
  }

  function handleClick() { stopRequested = true; }
  canvas.addEventListener('click', handleClick, { once: true });
  canvas.style.cursor = 'pointer';

  function tick(now) {
    const p = Math.min((now - t0) / dur, 1);

    // User clicked and animation is not in its final decel phase
    if (stopRequested && p < 0.9) {
      if (wheelRaf) { cancelAnimationFrame(wheelRaf); wheelRaf = null; }
      snapToNearest();
      return;
    }

    const e = 1 - Math.pow(1 - p, 4); // ease-out quart
    wheelRot = startRot + totalDelta * e;
    drawWheel(canvas, items, wheelRot);
    if (p < 1) {
      wheelRaf = requestAnimationFrame(tick);
    } else {
      canvas.removeEventListener('click', handleClick);
      canvas.style.cursor = '';
      wheelRot = endRot;
      onDone(target);
    }
  }

  wheelRaf = requestAnimationFrame(tick);
}

// ══════════════════════════════════════════════════
//  RENDER CONTROLLER
// ══════════════════════════════════════════════════
function render() {
  // Cancel any running animation
  if (wheelRaf) { cancelAnimationFrame(wheelRaf); wheelRaf = null; }

  // Progress bar
  const stepMap = {
    [S.PERSONA]:   -1,
    [S.INITIAL]:   0,
    [S.SPIN1]:     1,
    [S.RESULT1]:   st.tantrumCount > 0 ? 2 : 1,
    [S.ASK_DIR]:   2, [S.SPIN2]: 2,
    [S.RESULT2]:   3,
    [S.EXHAUSTED]: 0,
    [S.FINDING]:   3,
    [S.NEARBY]:    3,
    [S.CANT_FIND]: st.tantrumCount > 0 ? 2 : 1,
  };
  const cur = stepMap[st.phase] ?? 0;
  const progressEl = document.getElementById('progress');
  if (cur < 0) {
    progressEl.style.display = 'none';
  } else {
    progressEl.style.display = '';
    for (let i = 0; i < 4; i++) {
      const bar = document.getElementById(`bar-${i}`);
      bar.className = 'bar' + (i < cur ? ' done' : i === cur ? ' active' : '');
    }
  }

  // Stage
  const stage = document.getElementById('stage');
  stage.innerHTML = '';
  afterDraw = null;

  const scene = document.createElement('div');
  scene.className = 'scene';

  switch (st.phase) {
    case S.PERSONA:    buildPersona(scene);    break;
    case S.INITIAL:    buildInitial(scene);    break;
    case S.SPIN1:      buildSpin(scene, false); break;
    case S.RESULT1:   buildResult1(scene);    break;
    case S.ASK_DIR:   buildAskDir(scene);     break;
    case S.SPIN2:     buildSpin(scene, true);  break;
    case S.RESULT2:   buildResult2(scene);    break;
    case S.EXHAUSTED: buildExhausted(scene);  break;
    case S.FINDING:   buildFinding(scene);    break;
    case S.NEARBY:    buildNearby(scene);     break;
    case S.CANT_FIND: buildCantFind(scene);   break;
  }

  stage.appendChild(scene);

  // Execute post-render canvas init
  if (afterDraw) requestAnimationFrame(afterDraw);
}

// ══════════════════════════════════════════════════
//  PHASE BUILDERS
// ══════════════════════════════════════════════════
function buildPersona(w) {
  append(w, mk('p', 'eyebrow', '你今天是哪種上班族？'));

  const list = mk('div', 'persona-list');

  const personas = [
    {
      id: 'busy',
      icon: '⚡',
      name: '忙碌上班族',
      desc: '時間有限，快速解決最重要',
      tags: ['超商', '外帶', '快速', '一個人'],
    },
    {
      id: 'holiday',
      icon: '🥂',
      name: '放假上班族',
      desc: '今天有時間，想吃點不一樣的',
      tags: ['內用', '排隊', '異國', '慢慢享受'],
    },
  ];

  personas.forEach(p => {
    const btn = mk('button', 'persona-btn');
    const tagsHtml = p.tags.map(t => `<span class="persona-tag">${t}</span>`).join('');
    btn.innerHTML = `
      <div class="persona-icon">${p.icon}</div>
      <div class="persona-content">
        <div class="persona-name">${p.name}</div>
        <div class="persona-desc">${p.desc}</div>
        <div class="persona-tags">${tagsHtml}</div>
      </div>`;
    btn.addEventListener('click', () => {
      st.persona = p.id;
      st.phase   = S.INITIAL;
      render();
    });
    list.appendChild(btn);
  });

  append(w, list);
}

function buildInitial(w) {
  const PERSONA_META = {
    busy:    { icon: '⚡', name: '忙碌上班族' },
    holiday: { icon: '🥂', name: '放假上班族' },
  };
  const pm = PERSONA_META[st.persona];
  if (pm) {
    const ind = mk('div', 'persona-indicator');
    ind.innerHTML = `
      <span class="persona-indicator-icon">${pm.icon}</span>
      <span class="persona-indicator-text">${pm.name}</span>
      <button class="switch-persona" id="switch-persona-btn">切換身份</button>`;
    append(w, ind);
  }

  append(w, mk('p', 'eyebrow', '選擇今天想吃的時段'));

  const list = mk('div', 'stack');
  Object.entries(currentData()).forEach(([name, d]) => {
    const btn = mk('button', 'cat-btn');
    btn.innerHTML = `
      <span>
        <span class="cat-name">${name}</span>
        <span class="cat-hint">${d.hint}</span>
      </span>
      <span class="cat-arr">›</span>`;
    btn.addEventListener('click', () => {
      st.category = name;
      st.phase    = S.SPIN1;
      wheelRot    = 0;
      render();
    });
    list.appendChild(btn);
  });

  append(w, list);

  afterDraw = () => {
    document.getElementById('switch-persona-btn')?.addEventListener('click', () => {
      st.phase = S.PERSONA;
      render();
    });
  };
}

function buildSpin(w, isSecond) {
  const catData = currentData()[st.category];
  const items   = isSecond
    ? catData.dirs.find(d => d.name === st.direction).items
    : catData.items;
  const label   = isSecond
    ? `${st.direction} 的選項`
    : `${st.category} 可以吃什麼`;

  const section = mk('div', 'wheel-section');

  const sub  = mk('p', 'wheel-subtitle', label);
  const frame = mk('div', 'wheel-frame');
  const ptr  = mk('div', 'wheel-ptr');

  const cnv  = document.createElement('canvas');
  cnv.id     = 'wheel';
  const size = Math.min(window.innerWidth - 80, 290);
  cnv.width  = size;
  cnv.height = size;

  frame.appendChild(ptr);
  frame.appendChild(cnv);

  const status = mk('p', 'spin-status', '命運的齒輪正在轉動，點一下可停止⋯');

  section.appendChild(sub);
  section.appendChild(frame);
  section.appendChild(status);
  append(w, section);

  const back = mk('div', 'back-link', isSecond ? '← 返回方向選擇' : '← 重新選擇類別');
  back.addEventListener('click', () => {
    if (isSecond) {
      st.direction = null;
      st.phase = S.ASK_DIR;
    } else {
      st = { phase: S.INITIAL, persona: st.persona, category: null, result1: null, direction: null, result2: null, tantrumCount: 0, nearbyResult: null };
      wheelRot = 0;
    }
    render();
  });
  append(w, back);

  afterDraw = () => {
    drawWheel(cnv, items, wheelRot);
    setTimeout(() => {
      spinWheel(cnv, items, (idx) => {
        const result = items[idx];
        setTimeout(() => {
          st.result1 = result;
          st.phase   = S.RESULT1;
          render();
        }, 500);
      });
    }, 400);
  };
}

function buildResult1(w) {
  const r = st.result1;

  const card = mk('div', 'result-card');
  card.innerHTML = `
    <div class="result-emoji">${r.emoji}</div>
    <div class="result-name">${r.name}</div>
    <div class="result-hint">命運之輪的選擇</div>`;

  const actions = mk('div', 'action-stack');

  const okBtn = mk('button', 'btn-main', `好，就吃 ${r.name}！`);
  okBtn.addEventListener('click', () => {
    st.result2 = r;
    st.phase   = S.RESULT2;
    render();
  });

  const noBtn = mk('button', 'btn-ghost', '🙅 我任性，不想吃這個');
  noBtn.addEventListener('click', () => {
    if (st.tantrumCount < MAX_TANTRUMS) {
      st.tantrumCount++;
      st.phase = S.ASK_DIR;
    } else {
      st.phase = S.EXHAUSTED;
    }
    render();
  });

  const cantFindBtn = mk('button', 'btn-cantfind', '📍 這附近找不到！');
  cantFindBtn.addEventListener('click', () => {
    st.phase = S.CANT_FIND;
    render();
  });

  actions.appendChild(okBtn);
  actions.appendChild(noBtn);
  actions.appendChild(cantFindBtn);

  append(w, card);
  append(w, actions);

  const back = mk('div', 'back-link', '← 重新選擇類別');
  back.addEventListener('click', () => {
    st = { phase: S.INITIAL, persona: st.persona, category: null, result1: null, direction: null, result2: null, tantrumCount: 0, nearbyResult: null };
    wheelRot = 0;
    render();
  });
  append(w, back);
}

function buildAskDir(w) {
  const catData = currentData()[st.category];
  const dirs    = [...catData.dirs].sort(() => Math.random() - 0.5).slice(0, 3);

  const q = mk('p', 'dir-q', '那你現在對什麼方向有興趣呢？');
  const list = mk('div', 'dir-list');

  dirs.forEach(d => {
    const btn = mk('button', 'dir-btn');
    btn.innerHTML = `
      <span class="dir-icon">${d.icon}</span>
      <div class="dir-text">
        <span class="dir-name">${d.name}</span>
        <span class="dir-desc">${d.desc}</span>
      </div>`;
    btn.addEventListener('click', () => {
      st.direction = d.name;
      st.phase     = S.SPIN2;
      wheelRot     = 0;
      render();
    });
    list.appendChild(btn);
  });

  const back = mk('div', 'back-link', '← 回上一個結果');
  back.addEventListener('click', () => {
    st.direction = null;
    st.phase = S.RESULT1;
    render();
  });

  append(w, q);
  append(w, list);
  append(w, back);
}

function buildResult2(w) {
  const r = st.result2;

  const card = mk('div', 'final-card');
  card.innerHTML = `
    <div class="final-eyebrow">今天就決定是</div>
    <div class="final-emoji">${r.emoji}</div>
    <div class="final-name">${r.name}</div>
    <div class="final-context">${st.direction ? `${st.direction} · ` : ''}${st.category}</div>`;

  const nearbyBtn = mk('button', 'btn-find-nearby', `📍 找附近的 ${r.name} 店家`);
  nearbyBtn.addEventListener('click', () => {
    st.phase = S.NEARBY;
    render();
  });

  const restartBtn = mk('button', 'btn-restart', '再選一次');
  restartBtn.addEventListener('click', () => {
    st = { phase: S.INITIAL, persona: st.persona, category: null, result1: null, direction: null, result2: null, tantrumCount: 0, nearbyResult: null };
    wheelRot = 0;
    render();
  });

  card.appendChild(nearbyBtn);
  card.appendChild(restartBtn);
  append(w, card);

  const back = mk('div', 'back-link', '← 反悔了，重新考慮');
  back.addEventListener('click', () => {
    st.result2 = null;
    st.phase = S.RESULT1;
    render();
  });
  append(w, back);
}

function buildExhausted(w) {
  const card = mk('div', 'exhausted-card');
  card.innerHTML = `
    <div class="exhausted-emoji">😮‍💨</div>
    <div class="exhausted-title">我沒招了</div>
    <div class="exhausted-msg">你先去冷靜一下<br>再回來選 QQ</div>
    <button class="btn-calm" id="calm-btn">好⋯我冷靜了</button>`;

  append(w, card);

  afterDraw = () => {
    document.getElementById('calm-btn')?.addEventListener('click', () => {
      st = { phase: S.INITIAL, persona: st.persona, category: null, result1: null, direction: null, result2: null, tantrumCount: 0, nearbyResult: null };
      wheelRot = 0;
      render();
    });
  };
}

function buildCantFind(w) {
  const r = st.result1;

  const card = mk('div', 'cantfind-card');
  card.innerHTML = `
    <div class="cantfind-emoji">🗺️</div>
    <div class="cantfind-title">${r?.name} 附近買不到？</div>
    <div class="cantfind-msg">沒關係，要怎麼辦呢？</div>`;
  append(w, card);

  const actions = mk('div', 'action-stack');

  const respinBtn = mk('button', 'btn-main', '🎰 重新抽一個選項');
  respinBtn.addEventListener('click', () => {
    wheelRot = 0;
    // 若已選過方向，在相同方向池再轉；否則回第一轉盤
    st.phase = st.direction ? S.SPIN2 : S.SPIN1;
    render();
  });

  const backBtn = mk('button', 'btn-ghost', '↩ 回主選單重選');
  backBtn.addEventListener('click', () => {
    st = { phase: S.INITIAL, persona: st.persona, category: null, result1: null, direction: null, result2: null, tantrumCount: 0, nearbyResult: null };
    wheelRot = 0;
    render();
  });

  actions.appendChild(respinBtn);
  actions.appendChild(backBtn);
  append(w, actions);
}

// ══════════════════════════════════════════════════
//  NEARBY FEATURE  (Google Maps 搜尋連結)
// ══════════════════════════════════════════════════
function buildFinding(w) {
  // FINDING 已不使用，直接轉 NEARBY
  st.phase = S.NEARBY;
  render();
}

function buildNearby(w) {
  const r = st.result2;
  const foodName = r?.name ?? '';

  // 提示：你選了什麼
  const reminder = mk('div', 'nearby-reminder');
  reminder.innerHTML = `
    <span class="nearby-reminder-label">你選擇的是</span>
    <span class="nearby-reminder-food">${r?.emoji ?? ''} ${foodName}</span>`;
  append(w, reminder);

  append(w, mk('p', 'eyebrow', '在 Google Maps 搜尋附近店家'));

  // Google Maps 搜尋卡片
  const searchUrl = `https://www.google.com/maps/search/${encodeURIComponent(foodName + ' 附近')}`;

  const mapsCard = document.createElement('a');
  mapsCard.className = 'maps-search-card';
  mapsCard.href = searchUrl;
  mapsCard.target = '_blank';
  mapsCard.rel = 'noopener noreferrer';
  mapsCard.innerHTML = `
    <div class="maps-search-left">
      <div class="maps-search-icon">🗺️</div>
      <div class="maps-search-text">
        <div class="maps-search-title">「${foodName}」附近</div>
        <div class="maps-search-sub">開啟 Google Maps · 含評分與照片</div>
      </div>
    </div>
    <div class="maps-search-arrow">↗</div>`;
  append(w, mapsCard);

  const backBtn = mk('button', 'btn-ghost', '← 回到選擇結果');
  backBtn.addEventListener('click', () => {
    st.phase = S.RESULT2;
    render();
  });
  append(w, backBtn);
}

// ══════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════
function mk(tag, cls, text) {
  const el = document.createElement(tag);
  if (cls)  el.className = cls;
  if (text !== undefined) el.textContent = text;
  return el;
}

function append(parent, child) {
  parent.appendChild(child);
  return child;
}

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
render();

// Dark mode toggle
(function initTheme() {
  const root   = document.documentElement;
  const btn    = document.getElementById('theme-toggle');
  const saved  = localStorage.getItem('theme');

  function applyTheme(dark) {
    if (dark) {
      root.setAttribute('data-theme', 'dark');
      btn.textContent = '☀️';
    } else {
      root.removeAttribute('data-theme');
      btn.textContent = '🌙';
    }
    // Re-draw canvas if wheel is currently visible
    const cnv = document.getElementById('wheel');
    if (cnv && !wheelRaf) drawWheel(cnv, [], 0);
  }

  applyTheme(saved === 'dark');

  btn.addEventListener('click', () => {
    const isDark = root.getAttribute('data-theme') === 'dark';
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
    applyTheme(!isDark);
  });
})();
</script>
