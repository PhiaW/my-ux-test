<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任性選擇器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <!-- TEMP: Figma capture script — remove after capture -->
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { font-family: inherit; border: none; cursor: pointer; background: none; }

    :root {
      /* Light Mode — 暖色晨曦 */
      --bg:         #FCF9F0;
      --surface:    #FFFFFF;
      --primary:    #F3A839;
      --primary-hv: #BF5730;
      --primary-lt: #F3CFA8;
      --text:       #3B332B;
      --muted:      #82491B;
      --border:     #E9E1D6;
      --on-primary: #15120F;   /* text on primary-bg, 11.8:1 contrast */
      --on-primary-container: #15120F;
      --sh:         0 2px 16px rgba(59,51,43,.07);
      --sh-lg:      0 8px 32px rgba(59,51,43,.12);
      --r:          20px;
      --rs:         14px;
      --fs-display: 32px;
      --fs-title:   24px;
      --fs-body:    18px;
      --fs-label:   16px;
      --fs-caption: 14px;
    }

    [data-theme="dark"] {
      /* Dark Mode — 微醺餘暉 */
      --bg:         #1E1812;
      --surface:    #2A211A;
      --primary:    #B65D32;
      --primary-hv: #E39B3F;
      --primary-lt: #74411F;
      --text:       #EBD7C0;
      --muted:      #B98C60;
      --border:     #3B332B;
      --on-primary: #1E1812;   /* text on primary-bg, 4.9:1 contrast */
      --on-primary-container: #B65D32;
      --sh:         0 2px 16px rgba(0,0,0,.35);
      --sh-lg:      0 8px 32px rgba(0,0,0,.55);
    }

    [data-theme="dark"] .theme-toggle {
      background: var(--surface);
      color: var(--primary-hv);
      box-shadow: 0 2px 10px rgba(0,0,0,.4);
    }

    [data-theme="dark"] .theme-toggle:hover {
      background: var(--border);
    }

    [data-theme="dark"] .final-card {
      box-shadow: 0 8px 36px rgba(182,93,50,.3);
    }

    [data-theme="dark"] .wheel-ptr {
      filter: drop-shadow(0 2px 6px rgba(182,93,50,.6));
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
    }

    /* ── App shell ─────────────────────────────── */
    .app {
      width: 100%;
      max-width: 420px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 0 20px 60px;
    }

    /* ── Header ────────────────────────────────── */
    .app-header {
      padding: 44px 0 18px;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: space-between;
    }

    .header-main {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .app-title {
      font-family: 'Playfair Display', serif;
      font-size: var(--fs-display);
      font-weight: 700;
      letter-spacing: -.5px;
      line-height: 1.15;
    }

    .app-sub {
      font-size: var(--fs-label);
      font-weight: 300;
      color: var(--muted);
      letter-spacing: .3px;
    }

    .theme-toggle {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 10px rgba(243,168,57,.35);
      transition: all .2s ease;
    }

    .theme-toggle:hover {
      background: var(--primary-hv);
      transform: scale(1.08);
    }

    /* ── Progress bar ──────────────────────────── */
    .progress {
      display: flex;
      flex-direction: row;
      gap: 5px;
      padding: 6px 0 28px;
    }

    .bar {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      transition: background .35s ease;
    }

    .bar.done   { background: var(--primary-lt); }
    .bar.active { background: var(--primary); }

    /* ── Stage ─────────────────────────────────── */
    #stage { flex: 1; display: flex; flex-direction: column; }

    .scene {
      display: flex;
      flex-direction: column;
      gap: 14px;
      animation: slideUp .35s ease forwards;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Shared label ──────────────────────────── */
    .eyebrow {
      font-size: var(--fs-body);
      font-weight: 500;
      color: var(--text);
    }

    /* ── Category buttons ──────────────────────── */
    .cat-btn {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: 20px 22px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--sh);
      text-align: left;
      transition: all .2s ease;
    }

    .cat-btn:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: var(--sh-lg);
    }

    .cat-btn:active { transform: translateY(0); }

    .cat-name {
      display: block;
      font-size: var(--fs-title);
      font-weight: 700;
      color: var(--text);
    }

    .cat-hint {
      display: block;
      font-size: var(--fs-caption);
      font-weight: 400;
      color: var(--muted);
      margin-top: 3px;
    }

    .cat-body {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 14px;
    }

    .cat-icon {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      color: var(--primary);
      font-size: 24px;
      flex-shrink: 0;
    }

    .cat-arr {
      font-size: 18px;
      color: var(--primary);
      flex-shrink: 0;
      line-height: 1;
      transition: color .2s ease;
    }

    .cat-btn:hover .cat-arr { color: var(--primary-hv); }
    .cat-btn:hover .cat-icon { color: var(--primary-hv); }

    /* ── Wheel ─────────────────────────────────── */
    .wheel-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .wheel-subtitle {
      font-size: var(--fs-label);
      color: var(--muted);
      font-weight: 400;
      text-align: center;
    }

    .wheel-frame {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wheel-ptr {
      position: absolute;
      top: -13px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 9px solid transparent;
      border-right: 9px solid transparent;
      border-top: 18px solid var(--primary);
      filter: drop-shadow(0 2px 6px rgba(243,168,57,.7));
      z-index: 2;
    }

    #wheel {
      display: block;
      border-radius: 50%;
      box-shadow: 0 6px 28px rgba(28,15,10,.15);
    }

    .spin-status {
      font-size: var(--fs-label);
      color: var(--muted);
      font-weight: 300;
      text-align: center;
      animation: blink 1.3s ease infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: .25; }
    }

    /* ── Result card ───────────────────────────── */
    .result-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      box-shadow: var(--sh-lg);
      animation: popIn .45s cubic-bezier(.34,1.56,.64,1) forwards;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    .result-icon  { font-size: 48px; color: var(--primary); line-height: 1; }
    .result-name  { font-size: var(--fs-display); font-weight: 700; margin-top: 4px; }
    .result-hint  {
      font-size: var(--fs-caption); color: var(--muted);
      font-weight: 400;
    }

    /* ── Action buttons ────────────────────────── */
    .action-stack { display: flex; flex-direction: column; gap: 10px; }

    .btn-main {
      padding: 16px;
      background: var(--primary);
      border-radius: var(--rs);
      font-size: var(--fs-body);
      font-weight: 500;
      color: var(--on-primary);
      transition: background .2s ease;
      text-align: center;
    }

    .btn-main:hover { background: var(--primary-hv); color: var(--surface); }

    .btn-ghost {
      padding: 16px;
      color: var(--muted);
      border: 1.5px solid var(--border);
      border-radius: var(--rs);
      font-size: var(--fs-label);
      font-weight: 400;
      transition: all .2s ease;
      text-align: center;
    }

    .btn-ghost:hover { color: var(--primary); border-color: var(--primary); }

    /* ── Direction chooser ─────────────────────── */
    .dir-q {
      font-size: var(--fs-body);
      font-weight: 500;
      line-height: 1.55;
      color: var(--text);
    }

    .dir-list { display: flex; flex-direction: column; gap: 10px; }

    .dir-btn {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      text-align: left;
      box-shadow: var(--sh);
      transition: all .2s ease;
    }

    .dir-btn:hover {
      border-color: var(--primary);
      background: var(--primary-lt);
      transform: translateX(4px);
    }

    .dir-icon { font-size: 28px; flex-shrink: 0; }

    .dir-text { display: flex; flex-direction: column; gap: 2px; }

    .dir-name { font-size: var(--fs-body); font-weight: 500; }
    .dir-desc { font-size: var(--fs-caption); font-weight: 300; color: var(--muted); }

    /* ── Final result ──────────────────────────── */
    .final-card {
      background: var(--primary);
      border-radius: var(--r);
      padding: 40px 24px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-shadow: 0 8px 36px rgba(243,168,57,.4);
      animation: popIn .5s cubic-bezier(.34,1.56,.64,1) forwards;
    }

    .final-eyebrow {
      font-size: var(--fs-title);
      font-weight: 700;
      color: var(--surface);
      opacity: .7;
    }

    .final-icon  { font-size: 64px; color: var(--surface); line-height: 1; }

    .final-name {
      font-size: var(--fs-display);
      font-weight: 700;
      color: var(--on-primary);
      text-align: center;
    }

    .final-context {
      font-size: var(--fs-label);
      color: var(--on-primary);
      font-weight: 400;
      opacity: .75;
    }

    .btn-restart {
      padding: 12px 30px;
      background: rgba(255,255,255,.18);
      color: var(--on-primary);
      border: 1.5px solid rgba(255,255,255,.35);
      border-radius: 100px;
      font-size: var(--fs-label);
      font-weight: 400;
      transition: all .2s ease;
    }

    .btn-restart:hover { background: rgba(255,255,255,.28); }

    /* ── Back link ─────────────────────────────── */
    .back-link {
      font-size: var(--fs-label);
      color: var(--muted);
      cursor: pointer;
      width: fit-content;
      transition: color .2s;
    }

    .back-link:hover { color: var(--primary); }

    /* ── Can't find button ─────────────────────── */
    .btn-cantfind {
      padding: 14px 16px;
      color: var(--muted);
      font-size: var(--fs-label);
      font-weight: 400;
      border: 1.5px dashed var(--border);
      border-radius: var(--rs);
      transition: all .2s ease;
      text-align: center;
    }

    .btn-cantfind:hover {
      border-color: var(--primary);
      color: var(--primary);
      border-style: solid;
    }

    /* ── Can't find card ───────────────────────── */
    .cantfind-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 32px 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      box-shadow: var(--sh-lg);
      text-align: center;
      animation: popIn .4s cubic-bezier(.34,1.56,.64,1) forwards;
    }

    .cantfind-emoji { font-size: 40px; color: var(--primary); line-height: 1; }

    .cantfind-title {
      font-size: var(--fs-title);
      font-weight: 700;
      color: var(--text);
      margin-top: 4px;
    }

    .cantfind-msg {
      font-size: var(--fs-label);
      font-weight: 400;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── Exhausted screen ──────────────────────── */
    .exhausted-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 44px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-shadow: 0 4px 20px rgba(59,51,43,.08);
      animation: popIn .45s cubic-bezier(.34,1.56,.64,1) forwards;
      text-align: center;
    }

    .exhausted-icon {
      font-size: 64px;
      color: var(--primary);
      line-height: 1;
    }

    .exhausted-title {
      font-size: var(--fs-title);
      font-weight: 700;
      color: var(--text);
    }

    .exhausted-msg {
      font-size: var(--fs-body);
      font-weight: 400;
      color: var(--muted);
      line-height: 1.55;
    }

    .btn-calm {
      flex: 1;
      padding: 14px 16px;
      background: var(--bg);
      color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 100px;
      font-size: var(--fs-label);
      font-weight: 500;
      transition: all .2s ease;
    }

    .btn-calm:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* ── Exhausted buttons row ──────────────────── */
    .exhausted-btns {
      display: flex;
      flex-direction: row;
      gap: 10px;
      width: 100%;
    }

    .btn-blind {
      flex: 1;
      padding: 14px 16px;
      background: var(--primary);
      color: var(--on-primary);
      border-radius: 100px;
      font-size: var(--fs-label);
      font-weight: 500;
      transition: all .2s ease;
    }

    .btn-blind:hover {
      background: var(--primary-hv);
      color: var(--surface);
      transform: translateY(-2px);
      box-shadow: var(--sh);
    }

    /* ── Blind challenge screen ─────────────────── */
    .blind-title {
      font-size: var(--fs-title);
      font-weight: 700;
      text-align: center;
      color: var(--text);
    }

    .blind-sub {
      font-size: var(--fs-body);
      font-weight: 400;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    .blind-chests {
      display: flex;
      flex-direction: row;
      gap: 12px;
      justify-content: center;
    }

    .blind-chest {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 20px 12px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--r);
      cursor: pointer;
      flex: 1;
      min-width: 0;
      transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease, opacity .3s ease;
      user-select: none;
    }

    .blind-chest:hover:not(.dimmed) {
      border-color: var(--primary);
      transform: translateY(-4px);
      box-shadow: var(--sh-lg);
    }

    .blind-chest.revealed {
      border-color: var(--primary);
      background: var(--primary-lt);
      animation: chest-pop .3s ease;
    }

    @keyframes chest-pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .blind-chest.dimmed {
      opacity: 0.3;
      pointer-events: none;
    }

    .chest-icon { font-size: 40px; color: var(--primary); }

    .chest-q {
      font-size: var(--fs-caption);
      font-weight: 700;
      color: var(--muted);
    }

    .chest-name {
      font-size: var(--fs-caption);
      font-weight: 700;
      color: var(--text);
      text-align: center;
    }

    .blind-reveal-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 20px 12px;
      background: var(--primary-lt);
      border: 2px solid var(--surface);
      border-radius: var(--r);
      width: 100%;
    }

    .blind-reveal-eyebrow {
      font-size: var(--fs-body);
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 1.8px;
    }

    .blind-reveal-icon { font-size: 40px; color: var(--surface); line-height: 1; }

    .blind-reveal-name {
      font-size: var(--fs-title);
      font-weight: 700;
      color: var(--on-primary-container);
    }

    .blind-confirm {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .blind-confirm-msg {
      font-size: var(--fs-body);
      font-weight: 500;
      color: var(--text);
      text-align: center;
    }

    /* ── Find nearby button (inside final-card) ── */
    .btn-find-nearby {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 24px 20px;
      background: rgba(255,255,255,.22);
      color: var(--on-primary);
      border: 1.5px solid rgba(255,255,255,.45);
      border-radius: var(--rs);
      font-size: var(--fs-label);
      font-weight: 500;
      transition: background .2s ease;
    }

    .btn-find-nearby i { font-size: 32px; line-height: 1; }

    .btn-find-nearby:hover { background: rgba(255,255,255,.32); }

    /* ── Finding (loading) ─────────────────────── */
    .finding-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 48px 0;
    }

    .finding-spinner {
      width: 44px;
      height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .finding-text {
      font-size: var(--fs-body);
      font-weight: 300;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    /* ── Nearby reminder card ────────────────── */
    .nearby-reminder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 24px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--sh);
    }

    .nearby-reminder-label {
      font-size: var(--fs-caption);
      font-weight: 400;
      color: var(--muted);
    }

    .nearby-reminder-icon {
      font-size: 64px;
      color: var(--primary);
      line-height: 1;
    }

    .nearby-reminder-name {
      font-size: var(--fs-display);
      font-weight: 700;
      color: var(--text);
    }

    /* ── Google Maps search card ───────────────── */
    .maps-search-card {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 20px 20px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--sh-lg);
      text-decoration: none;
      color: var(--text);
      transition: all .2s ease;
    }

    .maps-search-card:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 10px 36px rgba(28,15,10,.14);
    }

    .maps-search-left {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 14px;
    }

    .maps-search-icon { font-size: 32px; }

    .maps-search-text {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .maps-search-title {
      font-size: var(--fs-label);
      font-weight: 500;
      color: var(--text);
    }

    .maps-search-sub {
      font-size: var(--fs-caption);
      font-weight: 400;
      color: var(--muted);
    }

    .maps-search-arrow {
      font-size: var(--fs-body);
      color: var(--muted);
      flex-shrink: 0;
    }

    /* ── Util: stack ───────────────────────────── */
    .stack { display: flex; flex-direction: column; gap: 12px; }

    /* ── Inline SVG illustration — theme-aware colors ──
       Light: class rule (specificity 0-1-0) overrides fill attr (0)
       Dark : [data-theme] + class (1-1-0) guarantees override        */
    .svgc-p   { fill: #F3A839; }
    .svgc-phv { fill: #BF5730; }
    .svgc-plt { fill: #F3CFA8; }
    .svgc-dk  { fill: #15120F; }
    .svgc-bg  { fill: #FCF9F0; }

    [data-theme="dark"] .svgc-p   { fill: #B65D32; }
    [data-theme="dark"] .svgc-phv { fill: #E39B3F; }
    [data-theme="dark"] .svgc-plt { fill: #74411F; }
    [data-theme="dark"] .svgc-dk  { fill: #EBD7C0; }
    [data-theme="dark"] .svgc-bg  { fill: #1E1812; }

    /* Fallback：如果 SVG 以 <img> 載入（file:// 或 fetch 失敗），
       dark mode 仍能用 filter 近似換色                              */
    [data-theme="dark"] img.persona-hero-img {
      filter: brightness(0.68) saturate(1.1);
    }

    /* ── Persona hero illustration ─────────────── */
    .persona-hero {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 4px 0 8px;
    }
    .persona-hero-img {
      width: 240px;
      height: auto;
      display: block;
    }
    .persona-list { display: flex; flex-direction: column; gap: 14px; }

    .persona-btn {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 18px;
      padding: 24px 20px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--sh);
      text-align: left;
      transition: all .25s ease;
    }

    .persona-btn:hover {
      border-color: var(--primary);
      transform: translateY(-3px);
      box-shadow: var(--sh-lg);
    }

    .persona-btn:active { transform: translateY(0); }

    .persona-icon {
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary), var(--on-primary));
      border-radius: 16px;
      flex-shrink: 0;
      color: #fff;
      font-size: 22px;
    }

    .persona-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .persona-name {
      font-size: var(--fs-body);
      font-weight: 700;
      color: var(--text);
    }

    .persona-desc {
      font-size: var(--fs-caption);
      color: var(--muted);
      font-weight: 300;
    }

    .persona-tags {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .persona-tag {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      background: var(--primary-lt);
      padding: 2px 10px;
      border-radius: 100px;
    }

    /* ── Persona indicator bar (INITIAL screen) ── */
    .persona-indicator {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--primary-lt);
      border-radius: var(--rs);
      margin-bottom: 4px;
    }

    .persona-indicator-icon {
      font-size: 13px;
      color: var(--primary-hv);
      display: flex;
      align-items: center;
    }

    .persona-indicator-text {
      font-size: var(--fs-caption);
      font-weight: 600;
      color: var(--text);
    }

    .switch-persona {
      font-size: var(--fs-caption);
      color: var(--muted);
      cursor: pointer;
      margin-left: auto;
      transition: color .2s;
    }

    .switch-persona:hover { color: var(--text); }
  </style>
</head>

  direction:    null,
  result2:      null,
  tantrumCount: 0,
  nearbyResult: null,
  blindPicks:   null,
};

// Inline SVG cache — loaded once, used every time PERSONA renders
let _foodSvgText = null;

// Preload SVG：成功後若仍在 PERSONA 畫面則重繪以套用 inline SVG
(function preloadFoodSvg() {
  fetch('assets/food-illustration.svg')
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(t => {
      _foodSvgText = t;
      if (typeof st !== 'undefined' && st.phase === S.PERSONA) render();
    })
    .catch(() => {
      // fetch 失敗（常見於 file:// 協議）：改用 XMLHttpRequest 同步讀取
      try {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', 'assets/food-illustration.svg', false); // synchronous
        xhr.send(null);
        if (xhr.status === 0 || xhr.status === 200) {
          _foodSvgText = xhr.responseText;
          if (typeof st !== 'undefined' && st.phase === S.PERSONA) render();
        }
      } catch (e) { /* 仍失敗則維持 <img> fallback */ }
    });
})();

// ══════════════════════════════════════════════════
//  WHEEL ENGINE
// ══════════════════════════════════════════════════
const WHEEL_COLORS_LIGHT = [
  '#FFE8D0','#FFF3E0','#F3CFA8','#FFECD8',
  '#FFE0C8','#FFF0D8','#FFD5A8','#FFEACC',
];

const WHEEL_COLORS_DARK = [
  '#3D2E24','#4A3828','#2E2420','#3A2C22',
  '#4A3424','#302824','#3A3020','#2C2420',
];

let wheelRot = 0;
let wheelRaf = null;
let afterDraw = null;

function drawWheel(canvas, items, rot) {
  const ctx    = canvas.getContext('2d');
  const W      = canvas.width, H = canvas.height;
  const cx     = W / 2, cy = H / 2;
  const R      = cx - 4;
  const N      = items.length;
  const seg    = (Math.PI * 2) / N;
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const colors = isDark ? WHEEL_COLORS_DARK : WHEEL_COLORS_LIGHT;

  ctx.clearRect(0, 0, W, H);

  items.forEach((item, i) => {
    const a0 = -Math.PI / 2 + i * seg + rot;
    const a1 = a0 + seg;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, a0, a1);
    ctx.closePath();
    ctx.fillStyle = colors[i % colors.length];
    ctx.fill();

    ctx.strokeStyle = isDark ? 'rgba(255,255,255,.12)' : 'rgba(255,255,255,.85)';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(a0 + seg / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = isDark ? '#EDE8E0' : '#2C1810';
    const fs = Math.max(12, Math.min(14, R * 0.115));
    ctx.font = `${fs}px 'Noto Sans TC', sans-serif`;
    ctx.fillText(item.name, R - 10, fs / 3);
    ctx.restore();
  });

  // Center hub
  ctx.beginPath();
  ctx.arc(cx, cy, 18, 0, Math.PI * 2);
  ctx.fillStyle = isDark ? '#1C2420' : '#FFFFFF';
  ctx.fill();
  ctx.strokeStyle = isDark ? 'rgba(255,255,255,.1)' : 'rgba(28,15,10,.08)';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function spinWheel(canvas, items, onDone) {
  if (wheelRaf) { cancelAnimationFrame(wheelRaf); wheelRaf = null; }

  const N      = items.length;
  const segRad = (Math.PI * 2) / N;
  const target = Math.floor(Math.random() * N);

  // Compute forward delta to land segment `target` at pointer
  const curMod = ((wheelRot % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  const tgtMod = ((-(target + 0.5) * segRad) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
  let delta    = tgtMod - curMod;
  if (delta < 0) delta += Math.PI * 2;

  const extra      = (5 + Math.floor(Math.random() * 4)) * Math.PI * 2;
  const totalDelta = extra + delta;
  const startRot   = wheelRot;
  const endRot     = wheelRot + totalDelta;
  const dur        = 3600 + Math.random() * 900;
  const t0         = performance.now();

  let stopRequested = false;

  // Snap to nearest segment then call onDone
  function snapToNearest() {
    canvas.style.cursor = '';
    const TWO_PI     = Math.PI * 2;
    const nearestIdx = Math.floor((((-wheelRot) % TWO_PI) + TWO_PI) % TWO_PI / segRad) % N;
    const targetBase = -(nearestIdx + 0.5) * segRad;
    let snapDelta    = ((targetBase - wheelRot) % TWO_PI + TWO_PI) % TWO_PI;
    if (snapDelta > Math.PI) snapDelta -= TWO_PI; // take shorter path

    const snapStart = wheelRot;
    const snapDur   = 450;
    const snapT0    = performance.now();

    function snapTick(t) {
      const sp = Math.min((t - snapT0) / snapDur, 1);
      const se = 1 - Math.pow(1 - sp, 3); // ease-out cubic
      wheelRot = snapStart + snapDelta * se;
      drawWheel(canvas, items, wheelRot);
      if (sp < 1) {
        wheelRaf = requestAnimationFrame(snapTick);
      } else {
        wheelRot = snapStart + snapDelta;
        onDone(nearestIdx);
      }
    }
    wheelRaf = requestAnimationFrame(snapTick);
  }

  function handleClick() { stopRequested = true; }
  canvas.addEventListener('click', handleClick, { once: true });
  canvas.style.cursor = 'pointer';

  function tick(now) {
    const p = Math.min((now - t0) / dur, 1);

    // User clicked and animation is not in its final decel phase
    if (stopRequested && p < 0.9) {
      if (wheelRaf) { cancelAnimationFrame(wheelRaf); wheelRaf = null; }
      snapToNearest();
      return;
    }

    const e = 1 - Math.pow(1 - p, 4); // ease-out quart
    wheelRot = startRot + totalDelta * e;
    drawWheel(canvas, items, wheelRot);
    if (p < 1) {
      wheelRaf = requestAnimationFrame(tick);
    } else {
      canvas.removeEventListener('click', handleClick);
      canvas.style.cursor = '';
      wheelRot = endRot;
      onDone(target);
    }
  }

  wheelRaf = requestAnimationFrame(tick);
}

// ══════════════════════════════════════════════════
//  RENDER CONTROLLER
// ══════════════════════════════════════════════════
function render() {
  // Cancel any running animation
  if (wheelRaf) { cancelAnimationFrame(wheelRaf); wheelRaf = null; }

  // Progress bar
  const stepMap = {
    [S.PERSONA]:   -1,
    [S.INITIAL]:   0,
    [S.SPIN1]:     1,
    [S.RESULT1]:   st.tantrumCount > 0 ? 2 : 1,
    [S.ASK_DIR]:   2, [S.SPIN2]: 2,
    [S.RESULT2]:   3,
    [S.EXHAUSTED]: 0,
    [S.BLIND]:     0,
    [S.FINDING]:   3,
    [S.NEARBY]:    3,
    [S.CANT_FIND]: st.tantrumCount > 0 ? 2 : 1,
  };
  const cur = stepMap[st.phase] ?? 0;
  const progressEl = document.getElementById('progress');
  if (cur < 0) {
    progressEl.style.display = 'none';
  } else {
    progressEl.style.display = '';
    for (let i = 0; i < 4; i++) {
      const bar = document.getElementById(`bar-${i}`);
      bar.className = 'bar' + (i < cur ? ' done' : i === cur ? ' active' : '');
    }
  }

  // Stage
  const stage = document.getElementById('stage');
  stage.innerHTML = '';
  afterDraw = null;

  const scene = document.createElement('div');
  scene.className = 'scene';

  switch (st.phase) {
    case S.PERSONA:    buildPersona(scene);    break;
    case S.INITIAL:    buildInitial(scene);    break;
    case S.SPIN1:      buildSpin(scene, false); break;
    case S.RESULT1:   buildResult1(scene);    break;
    case S.ASK_DIR:   buildAskDir(scene);     break;
    case S.SPIN2:     buildSpin(scene, true);  break;
    case S.RESULT2:   buildResult2(scene);    break;
    case S.EXHAUSTED: buildExhausted(scene);  break;
    case S.BLIND:     buildBlind(scene);      break;
    case S.FINDING:   buildFinding(scene);    break;
    case S.NEARBY:    buildNearby(scene);     break;
    case S.CANT_FIND: buildCantFind(scene);   break;
  }

  stage.appendChild(scene);

  // Execute post-render canvas init
  if (afterDraw) requestAnimationFrame(afterDraw);
}

function buildPersona(w) {
  const hero = mk('div', 'persona-hero');

  if (_foodSvgText) {
    hero.innerHTML = _foodSvgText;
    const svg = hero.querySelector('svg');
    if (svg) {
      svg.removeAttribute('width');
      svg.removeAttribute('height');
      svg.classList.add('persona-hero-img');
    }
  } else {
    // fallback: <img> with dark mode CSS filter approximation
    // (global preload will call render() again once SVG text is ready)
    const img = document.createElement('img');
    img.src = 'assets/food-illustration.svg';
    img.alt = '';
    img.className = 'persona-hero-img';
    hero.appendChild(img);
  }

  append(w, hero);

  append(w, mk('p', 'eyebrow', '你今天是哪種心情/狀態？'));

  const list = mk('div', 'persona-list');

  const personas = [
    {
      id: 'busy',
      faIcon: 'fa-bolt',
      name: '想簡單吃',
      desc: '時間有限，快速解決最重要',
      tags: ['超商', '外帶', '快速', '輕便'],
    },
    {
      id: 'holiday',
      faIcon: 'fa-champagne-glasses',
      name: '放假可以慢慢選',
      desc: '今天有時間，想吃點不一樣的',
      tags: ['內用', '排隊', '異國', '慢慢享受'],
    },
  ];

  personas.forEach(p => {
    const btn = mk('button', 'persona-btn');
    const tagsHtml = p.tags.map(t => `<span class="persona-tag">${t}</span>`).join('');
    btn.innerHTML = `
      <div class="persona-icon"><i class="fa-solid ${p.faIcon}"></i></div>
      <div class="persona-content">
        <div class="persona-name">${p.name}</div>
        <div class="persona-desc">${p.desc}</div>
        <div class="persona-tags">${tagsHtml}</div>
      </div>`;
    btn.addEventListener('click', () => {
      st.persona = p.id;
      st.phase   = S.INITIAL;
      render();
    });
    list.appendChild(btn);

  append(w, list);
}

function buildInitial(w) {
  const PERSONA_META = {
    busy:    { faIcon: 'fa-bolt', name: '想簡單吃' },
    holiday: { faIcon: 'fa-champagne-glasses', name: '放假可以慢慢選' },

  }

  append(w, mk('p', 'eyebrow', '選擇今天想吃的時段'));

  const list = mk('div', 'stack');
  Object.entries(currentData()).forEach(([name, d]) => {
    const btn = mk('button', 'cat-btn');
    btn.innerHTML = `
      <span>
        <span class="cat-name">${name}</span>

}

function buildSpin(w, isSecond) {
  const catData = currentData()[st.category];
  const items   = isSecond
    ? catData.dirs.find(d => d.name === st.direction).items
    : catData.items;
  const label   = isSecond
    ? `${st.direction} 的選項`
    : `${st.category} 可以吃什麼`;

  const section = mk('div', 'wheel-section');

  const sub  = mk('p', 'wheel-subtitle', label);
  const frame = mk('div', 'wheel-frame');
  const ptr  = mk('div', 'wheel-ptr');

  const cnv  = document.createElement('canvas');
  cnv.id     = 'wheel';
  const size = Math.min(window.innerWidth - 80, 290);
  cnv.width  = size;
  cnv.height = size;

  frame.appendChild(ptr);
  frame.appendChild(cnv);

  const status = mk('p', 'spin-status', '命運的齒輪正在轉動，點一下可停止⋯');

  section.appendChild(sub);
  section.appendChild(frame);
  section.appendChild(status);
  append(w, section);

  const back = mk('div', 'back-link', isSecond ? '← 返回方向選擇' : '← 重新選擇類別');
  back.addEventListener('click', () => {
    if (isSecond) {
      st.direction = null;
      st.phase = S.ASK_DIR;
    } else {
      st = { phase: S.INITIAL, persona: st.persona, category: null, result1: null, direction: null, result2: null, tantrumCount: 0, nearbyResult: null };
      wheelRot = 0;
    }
    render();
  });
  append(w, back);

  afterDraw = () => {
    drawWheel(cnv, items, wheelRot);
    setTimeout(() => {
      spinWheel(cnv, items, (idx) => {
        const result = items[idx];
        setTimeout(() => {
          st.result1 = result;
          st.phase   = S.RESULT1;
          render();
        }, 500);
      });
    }, 400);
  };
}

}

// ══════════════════════════════════════════════════
//  NEARBY FEATURE  (Google Maps 搜尋連結)
// ══════════════════════════════════════════════════
function buildFinding(w) {
  // FINDING 已不使用，直接轉 NEARBY
  st.phase = S.NEARBY;
  render();
}

function buildNearby(w) {
  const r = st.result2;
  const foodName = r?.name ?? '';

  // 你選擇的是：垂直置中卡片
  const reminder = mk('div', 'nearby-reminder');
  reminder.innerHTML = `
    <span class="nearby-reminder-label">你選擇的是</span>
    <div class="nearby-reminder-icon"><i class="fa-solid fa-${r?.icon ?? 'utensils'}"></i></div>
    <div class="nearby-reminder-name">${foodName}</div>`;
  append(w, reminder);

  append(w, mk('p', 'eyebrow', '在 GOOGLE MAPS 搜尋附近店家'));

  // Google Maps 搜尋卡片
  const searchUrl = `https://www.google.com/maps/search/${encodeURIComponent(foodName + ' 附近')}`;

  const mapsCard = document.createElement('a');
  mapsCard.className = 'maps-search-card';
  mapsCard.href = searchUrl;
  mapsCard.target = '_blank';
  mapsCard.rel = 'noopener noreferrer';
  mapsCard.innerHTML = `
    <div class="maps-search-left">
      <div class="maps-search-icon"><i class="fa-solid fa-map"></i></div>
      <div class="maps-search-text">
        <div class="maps-search-title">找附近的${foodName}</div>
        <div class="maps-search-sub">開啟 Google Maps</div>
      </div>
    </div>
    <div class="maps-search-arrow"><i class="fa-solid fa-circle-arrow-right"></i></div>`;
  append(w, mapsCard);

  const backBtn = mk('button', 'btn-ghost', '← 回到選擇結果');
  backBtn.addEventListener('click', () => {
    st.phase = S.RESULT2;
    render();
  });
  append(w, backBtn);
}

// ══════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════
function mk(tag, cls, text) {
  const el = document.createElement(tag);
  if (cls)  el.className = cls;
  if (text !== undefined) el.textContent = text;
  return el;
}

function append(parent, child) {
  parent.appendChild(child);
  return child;
}

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
render();

// Dark mode toggle
(function initTheme() {
  const root   = document.documentElement;
  const btn    = document.getElementById('theme-toggle');
  const saved  = localStorage.getItem('theme');

  function applyTheme(dark) {
    if (dark) {
      root.setAttribute('data-theme', 'dark');
      btn.firstElementChild.className = 'fa-solid fa-sun';
    } else {
      root.removeAttribute('data-theme');
      btn.firstElementChild.className = 'fa-solid fa-moon';
    }
    // Re-draw canvas if wheel is currently visible
    const cnv = document.getElementById('wheel');
    if (cnv && !wheelRaf) drawWheel(cnv, [], 0);
  }

  applyTheme(saved === 'dark');

  btn.addEventListener('click', () => {
    const isDark = root.getAttribute('data-theme') === 'dark';
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
    applyTheme(!isDark);
  });
})();
</script>
